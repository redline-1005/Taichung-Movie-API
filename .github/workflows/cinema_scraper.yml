name: 大台中電影時刻表每日自動爬取

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  auto_scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 取得最新程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安裝套件
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 安裝 Playwright 瀏覽器
        run: python -m playwright install chromium

      - name: 安裝 xvfb
        run: sudo apt-get install -y xvfb

      - name: 執行爬蟲
        run: xvfb-run python main_scraper.py

      - name: 推送更新後的資料庫到 GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Robot"
          git add movie_database.db
          git commit -m "chore: 自動更新場次資料庫" || echo "無變更，略過 commit"
          git push
      
      - name: 上傳診斷截圖
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"