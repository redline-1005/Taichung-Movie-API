name: 大台中電影時刻表每日自動爬取

on:
  schedule:
    # 每天台灣時間早上 06:00 自動執行 (UTC 時間為 22:00)
    - cron: '0 22 * * *'
  workflow_dispatch: # 允許隨時手動到 GitHub 網頁上點擊執行測試

jobs:
  auto_scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 給予寫入權限，機器人才能把更新後的 database.db 推回倉庫
      
    steps:
      - name: 1. 複製倉庫程式碼到雲端虛擬機
        uses: actions/checkout@v4

      - name: 2. 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 3. 安裝 Python 核心相依套件
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. 安裝 Playwright 瀏覽器核心 (威秀、秀泰必備)
        run: npx playwright install chromium

      - name: 5. 點火執行總調度爬蟲 🚀
        run: python main_scraper.py

      - name: 6. 自動將最新的 database.db 成果推回 GitHub 🎯
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Robot"
          git add database.db
          git commit -m "chore: 雲端機器人自動更新今日電影時刻表" || echo "今日資料無變動，跳過更新"
          git push